services:
  - type: web
    name: cgs-backend
    env: python
    region: oregon
    
    # Build command (installs dependencies)
    buildCommand: pip install -r requirements.txt
    
    # Start command (uses gunicorn for production)
    startCommand: gunicorn -w 4 -b 0.0.0.0:$PORT app:app
    
    # Environment variables - set these in Render dashboard
    envVars:
      - key: FLASK_ENV
        value: production
      - key: FLASK_SECRET_KEY
        fromSecret: FLASK_SECRET_KEY
      - key: MYSQL_HOST
        fromSecret: MYSQL_HOST
      - key: MYSQL_USER
        fromSecret: MYSQL_USER
      - key: MYSQL_PASSWORD
        fromSecret: MYSQL_PASSWORD
      - key: MYSQL_DB
        value: cgs
      - key: GOOGLE_MAPS_API_KEY
        fromSecret: GOOGLE_MAPS_API_KEY

    # Auto-deploy from GitHub
    autoDeploy: true
    
    # Health check
    healthCheckPath: /health
