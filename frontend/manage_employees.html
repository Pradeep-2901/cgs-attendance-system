<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Employees</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --primary-dark: #667eea;
        }
        
        body {
            background: #f8f9fa;
        }
        
        .navbar-custom {
            background: var(--primary-gradient);
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .btn-custom {
            background: var(--primary-gradient);
            border: none;
            color: white;
        }
        
        .btn-custom:hover {
            background: linear-gradient(135deg, #5a6fd8 0%, #6a4190 100%);
            color: white;
        }
        
        .card-custom {
            border: none;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        
        .table-responsive {
            border-radius: 12px;
        }
        
        .btn-group-custom .btn {
            margin: 0 2px;
        }
        
        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--primary-gradient);
            color: white;
            font-weight: bold;
            margin-right: 12px;
        }
        
        .employee-row {
            transition: background-color 0.2s;
        }
        
        .employee-row:hover {
            background-color: #f8f9fa;
        }
        
        .status-badge {
            padding: 0.5rem 0.75rem;
            border-radius: 20px;
        }
        
        .page-header {
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid #e9ecef;
        }
    </style>
    
    <script>
        // Inject current user from server
        const currentUser = {
            user_id: '{{ user_id }}',
            username: '{{ username }}',
            name: '{{ name }}',
            role: '{{ role }}'
        };
    </script>
</head>
<body class="bg-light">
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom">
        <div class="container-lg">
            <a class="navbar-brand fw-bold" href="./admin_dashboard.html">
                <i class="fas fa-users-cog me-2"></i>Admin Panel
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <div class="navbar-nav ms-auto">
                    <span class="navbar-text me-3" id="user-display">Welcome!</span>
                    <a href="#" onclick="handleLogout(event)" class="nav-link">
                        <i class="fas fa-sign-out-alt"></i> Logout
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <div class="container-lg mt-5">
        <!-- Page Header -->
        <div class="row mb-4 page-header">
            <div class="col-md-8">
                <h2 class="mb-2"><i class="fas fa-users text-primary"></i> Manage Employees</h2>
                <p class="text-muted mb-0">Add, edit, or remove employee accounts</p>
            </div>
            <div class="col-md-4 text-end">
                <a href="./add_employee.html" class="btn btn-custom me-2">
                    <i class="fas fa-plus"></i> Add New Employee
                </a>
                <a href="./admin_dashboard.html" class="btn btn-outline-secondary">
                    <i class="fas fa-arrow-left"></i> Back
                </a>
            </div>
        </div>

        <!-- Employees List Card -->
        <div class="card card-custom">
            <div class="card-header bg-white border-bottom">
                <h5 class="mb-0">
                    <i class="fas fa-list text-primary"></i> Employee List
                    <span id="employee-count" class="badge bg-primary ms-2">0</span>
                </h5>
            </div>
            <div class="card-body p-0">
                <div id="employees-container">
                    <div class="text-center py-5">
                        <div class="spinner-border text-primary" role="status">
                            <span class="visually-hidden">Loading...</span>
                        </div>
                        <p class="text-muted mt-3">Loading employees...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div class="modal fade" id="deleteModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header border-danger">
                    <h5 class="modal-title">
                        <i class="fas fa-exclamation-triangle text-danger"></i> Confirm Delete
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p>Are you sure you want to delete employee <strong id="modal-employee-name"></strong>?</p>
                    <div class="alert alert-warning mb-0">
                        <i class="fas fa-info-circle"></i> This will also delete all their attendance records!
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-danger" id="confirm-delete-btn">
                        <i class="fas fa-trash"></i> Delete Employee
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_URL = window.API_URL_OVERRIDE || localStorage.getItem('API_URL') || 'http://localhost:5000';
        let employeeToDelete = null;
        
        function handleLogout(e) {
            e.preventDefault();
            localStorage.removeItem('currentUser');
            localStorage.removeItem('API_URL');
            window.location.href = './index.html';
        }
        
        async function loadEmployees() {
            try {
                if (!currentUser || !currentUser.user_id) {
                    window.location.href = './index.html';
                    return;
                }
                
                const response = await fetch(`${API_URL}/api/employees`, {
                    method: 'GET',
                    credentials: 'include',
                    headers: {
                        'Accept': 'application/json'
                    }
                });
                
                if (response.status === 403 || response.status === 401) {
                    window.location.href = './index.html';
                    return;
                }
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                
                const employees = await response.json();
                displayEmployees(employees);
            } catch (error) {
                console.error('Error loading employees:', error);
                document.getElementById('employees-container').innerHTML = `
                    <div class="text-center py-5">
                        <i class="fas fa-exclamation-circle fa-3x text-danger mb-3"></i>
                        <h4 class="text-danger">Error Loading Employees</h4>
                        <p class="text-muted">${error.message}</p>
                        <button class="btn btn-primary" onclick="loadEmployees()">Try Again</button>
                    </div>
                `;
            }
        }
        
        function displayEmployees(employees) {
            const container = document.getElementById('employees-container');
            document.getElementById('employee-count').textContent = employees.length;
            
            if (employees.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-5">
                        <i class="fas fa-users fa-4x text-muted mb-3"></i>
                        <h4 class="text-muted">No employees found</h4>
                        <p class="text-muted mb-4">Get started by adding your first employee.</p>
                        <a href="./add_employee.html" class="btn btn-custom">
                            <i class="fas fa-plus"></i> Add First Employee
                        </a>
                    </div>
                `;
                return;
            }
            
            let tableHtml = `
                <div class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead class="table-light">
                            <tr>
                                <th style="width: 20%">Name</th>
                                <th style="width: 20%">Username</th>
                                <th style="width: 25%">Email</th>
                                <th style="width: 15%">Role</th>
                                <th style="width: 20%" class="text-end">Actions</th>
                            </tr>
                        </thead>
                        <tbody>
            `;
            
            employees.forEach(emp => {
                const initial = (emp.name || emp.username || 'U').charAt(0).toUpperCase();
                const role = emp.role || 'Employee';
                const email = emp.email || '-';
                
                tableHtml += `
                    <tr class="employee-row">
                        <td>
                            <div class="d-flex align-items-center">
                                <div class="avatar">${initial}</div>
                                <strong>${emp.name || 'No Name'}</strong>
                            </div>
                        </td>
                        <td><code>${emp.username}</code></td>
                        <td>${email}</td>
                        <td>
                            <span class="badge bg-info text-dark">${role}</span>
                        </td>
                        <td class="text-end">
                            <div class="btn-group btn-group-custom" role="group">
                                <a href="./edit_employee.html?id=${emp.user_id}" 
                                   class="btn btn-sm btn-outline-warning" 
                                   title="Edit Employee">
                                    <i class="fas fa-edit"></i>
                                </a>
                                <button type="button" 
                                        class="btn btn-sm btn-outline-danger" 
                                        onclick="showDeleteConfirm(${emp.user_id}, '${(emp.name || emp.username).replace(/'/g, "\\'")}')"
                                        title="Delete Employee">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </div>
                        </td>
                    </tr>
                `;
            });
            
            tableHtml += `
                        </tbody>
                    </table>
                </div>
            `;
            
            container.innerHTML = tableHtml;
        }
        
        function showDeleteConfirm(userId, employeeName) {
            employeeToDelete = userId;
            document.getElementById('modal-employee-name').textContent = employeeName;
            new bootstrap.Modal(document.getElementById('deleteModal')).show();
        }
        
        async function deleteEmployee() {
            if (!employeeToDelete) return;
            
            try {
                const response = await fetch(`${API_URL}/api/employees/${employeeToDelete}`, {
                    method: 'DELETE',
                    credentials: 'include'
                });
                
                if (response.status === 403 || response.status === 401) {
                    alert('You do not have permission to delete employees');
                    window.location.href = './index.html';
                    return;
                }
                
                if (response.ok || response.status === 204) {
                    bootstrap.Modal.getInstance(document.getElementById('deleteModal')).hide();
                    loadEmployees();
                } else {
                    alert('Error deleting employee. Please try again.');
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Error deleting employee');
            }
            
            employeeToDelete = null;
        }
        
        // Set up delete button
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('confirm-delete-btn').addEventListener('click', deleteEmployee);
            loadEmployees();
        });
    </script>
</body>
</html>
