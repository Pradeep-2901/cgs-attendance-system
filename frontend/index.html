<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CGS GREEN SUSTAINERGY - Login</title>
    <link rel="stylesheet" href="./css/styles.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: Arial, sans-serif;
        }
        
        .container {
            width: 100%;
            max-width: 500px;
            padding: 20px;
        }
        
        .login-box {
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            padding: 40px;
            margin-bottom: 20px;
        }
        
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .logo h1 {
            margin: 0;
            color: #333;
            font-size: 24px;
        }
        
        .form {
            display: none;
        }
        
        .form.active {
            display: block;
        }
        
        .form h2 {
            color: #667eea;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .form input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            box-sizing: border-box;
        }
        
        .password-wrapper {
            position: relative;
            margin: 10px 0;
        }
        
        .password-wrapper input {
            padding-right: 40px;
        }
        
        .toggle-eye {
            position: absolute;
            right: 12px;
            top: 12px;
            cursor: pointer;
            user-select: none;
        }
        
        .form button {
            width: 100%;
            padding: 12px;
            margin: 20px 0 10px 0;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        .form button:hover {
            background: #5568d3;
        }
        
        .form button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        
        .toggle-btn {
            text-align: center;
            margin-top: 20px;
        }
        
        .admin-tab {
            display: inline-block;
            background: transparent;
            border: 2px solid #667eea;
            color: #667eea;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .admin-tab:hover {
            background: #667eea;
            color: white;
        }
        
        .flash-message {
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 4px;
            text-align: center;
        }
        
        .flash-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .flash-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="login-box">
            <div class="logo">
                <h1>CGS GREEN SUSTAINERGY</h1>
                <p style="color: #999; margin: 5px 0 0 0;">Attendance Management System</p>
            </div>
            
            <!-- Employee Login Form -->
            <form class="form active" id="employeeForm" method="POST">
                <h2>Employee Login</h2>
                <input type="text" name="username" placeholder="Username" required />
                <div class="password-wrapper">
                    <input type="password" name="password" id="employeePassword" placeholder="Password" required />
                    <span class="toggle-eye" onclick="togglePassword('employeePassword', this)">👁️</span>
                </div>
                <input type="hidden" name="role" value="employee">
                <button type="submit">Login</button>
            </form>
            
            <!-- Admin Login Form -->
            <form class="form hidden" id="adminForm" method="POST">
                <h2>Admin Login</h2>
                <input type="text" name="username" placeholder="Username" required />
                <div class="password-wrapper">
                    <input type="password" name="password" id="adminPassword" placeholder="Password" required />
                    <span class="toggle-eye" onclick="togglePassword('adminPassword', this)">👁️</span>
                </div>
                <input type="hidden" name="role" value="admin">
                <button type="submit">Login</button>
            </form>
            
            <!-- Toggle Button -->
            <div class="toggle-btn">
                <div class="admin-tab" id="toggleBtn" onclick="toggleForms()">
                    Switch to Admin
                </div>
            </div>
        </div>
    </div>

    <script src="./js/config.js"></script>
    <script src="./js/api.js"></script>
    <script src="./js/auth.js"></script>
    <script>
        // Require no auth (redirect if already logged in)
        document.addEventListener('DOMContentLoaded', () => {
            requireNoAuth();
        });
        
        function togglePassword(inputId, icon) {
            const input = document.getElementById(inputId);
            if (input.type === 'password') {
                input.type = 'text';
                icon.textContent = '🙈';
            } else {
                input.type = 'password';
                icon.textContent = '👁️';
            }
        }
        
        function toggleForms() {
            const employeeForm = document.getElementById('employeeForm');
            const adminForm = document.getElementById('adminForm');
            const toggleBtn = document.getElementById('toggleBtn');
            
            if (employeeForm.classList.contains('active')) {
                employeeForm.classList.remove('active');
                adminForm.classList.add('active');
                toggleBtn.textContent = 'Switch to Employee';
            } else {
                adminForm.classList.remove('active');
                employeeForm.classList.add('active');
                toggleBtn.textContent = 'Switch to Admin';
            }
        }
    </script>
</body>
</html>
