<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CGS Attendance System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }

        .login-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }

        .login-header h1 {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .login-header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .login-body {
            padding: 40px 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            transition: all 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .password-group {
            position: relative;
            margin-bottom: 20px;
        }

        .password-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .password-group input {
            width: 100%;
            padding: 12px 40px 12px 15px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            transition: all 0.3s;
        }

        .password-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .toggle-password {
            position: absolute;
            right: 12px;
            top: 38px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 18px;
            color: #666;
            transition: color 0.2s;
        }

        .toggle-password:hover {
            color: #333;
        }

        .role-group {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
        }

        .role-option {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .role-option input[type="radio"] {
            cursor: pointer;
            width: 18px;
            height: 18px;
        }

        .role-option label {
            cursor: pointer;
            margin: 0;
            font-size: 14px;
            font-weight: 500;
            text-transform: none;
            letter-spacing: normal;
            color: #555;
        }

        .alert {
            padding: 12px 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 13px;
            display: none;
        }

        .alert.show {
            display: block;
        }

        .alert-error {
            background-color: #fee;
            color: #c33;
            border: 1px solid #fcc;
        }

        .alert-success {
            background-color: #efe;
            color: #3c3;
            border: 1px solid #cfc;
        }

        .submit-btn {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.3);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .submit-btn.loading {
            opacity: 0.7;
            pointer-events: none;
        }

        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .footer-text {
            text-align: center;
            font-size: 12px;
            color: #999;
            margin-top: 20px;
        }

        @media (max-width: 480px) {
            .login-header {
                padding: 30px 20px;
            }

            .login-body {
                padding: 30px 20px;
            }

            .login-header h1 {
                font-size: 24px;
            }
        }
    </style>
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>CGS Attendance</h1>
            <p>Employee Management System</p>
        </div>
        <div class="login-body">
            <div class="alert alert-error" id="error-alert"></div>
            <div class="alert alert-success" id="success-alert"></div>

            <form id="login-form">
                <!-- Role Selection -->
                <div class="role-group">
                    <div class="role-option">
                        <input type="radio" id="role-employee" name="role" value="employee" checked>
                        <label for="role-employee">Employee</label>
                    </div>
                    <div class="role-option">
                        <input type="radio" id="role-admin" name="role" value="admin">
                        <label for="role-admin">Admin</label>
                    </div>
                </div>

                <!-- Username -->
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Enter your username" required autocomplete="username">
                </div>

                <!-- Password -->
                <div class="password-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required autocomplete="current-password">
                    <button type="button" class="toggle-password" onclick="togglePasswordVisibility()">👁️</button>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="submit-btn" id="submit-btn">
                    Login
                </button>
            </form>

            <div class="footer-text">
                <p>Secure Employee Attendance & Leave Management</p>
            </div>
        </div>
    </div>

    <script>
        // Determine API URL
        const API_URL = (() => {
            const hostname = window.location.hostname;
            if (hostname.includes('netlify.app')) {
                return 'https://cgs-attendance-system.onrender.com';
            }
            if (hostname.includes('localhost') || hostname.includes('127.0.0.1')) {
                return 'http://localhost:5000';
            }
            return 'https://cgs-attendance-system.onrender.com';
        })();

        /**
         * Toggle password visibility
         */
        function togglePasswordVisibility() {
            const input = document.getElementById('password');
            const btn = document.querySelector('.toggle-password');
            
            if (input.type === 'password') {
                input.type = 'text';
                btn.textContent = '🙈';
            } else {
                input.type = 'password';
                btn.textContent = '👁️';
            }
        }

        /**
         * Show alert message
         */
        function showAlert(message, type) {
            const alertDiv = document.getElementById(`${type}-alert`);
            alertDiv.textContent = message;
            alertDiv.classList.add('show');
            
            if (type === 'error') {
                setTimeout(() => alertDiv.classList.remove('show'), 5000);
            }
        }

        /**
         * Handle login form submission
         */
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const submitBtn = document.getElementById('submit-btn');
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const role = document.querySelector('input[name="role"]:checked').value;

            if (!username || !password) {
                showAlert('Please enter both username and password', 'error');
                return;
            }

            // Show loading state
            submitBtn.classList.add('loading');
            submitBtn.innerHTML = '<span class="spinner"></span>Logging in...';

            try {
                const response = await fetch(`${API_URL}/login`, {
                    method: 'POST',
                    credentials: 'include',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify({
                        username: username,
                        password: password,
                        role: role
                    })
                });

                const data = await response.json();

                if (response.ok && data.authenticated) {
                    showAlert(`Welcome ${data.name || username}!`, 'success');
                    
                    // Store session data
                    localStorage.setItem('API_URL', API_URL);
                    
                    // Redirect based on role
                    setTimeout(() => {
                        if (role === 'admin') {
                            window.location.href = './admin_dashboard.html';
                        } else {
                            window.location.href = './dashboard.html';
                        }
                    }, 1000);
                } else {
                    showAlert(data.message || 'Invalid credentials', 'error');
                    submitBtn.classList.remove('loading');
                    submitBtn.innerHTML = 'Login';
                }
            } catch (error) {
                console.error('Login error:', error);
                showAlert('Connection error. Please try again.', 'error');
                submitBtn.classList.remove('loading');
                submitBtn.innerHTML = 'Login';
            }
        });

        // Check if already logged in
        window.addEventListener('load', async () => {
            try {
                const response = await fetch(`${API_URL}/api/check_session`, {
                    method: 'GET',
                    credentials: 'include',
                    headers: {
                        'Accept': 'application/json'
                    }
                });

                if (response.ok) {
                    const data = await response.json();
                    if (data.authenticated) {
                        // Already logged in, redirect
                        if (data.role === 'admin') {
                            window.location.href = './admin_dashboard.html';
                        } else {
                            window.location.href = './dashboard.html';
                        }
                    }
                }
            } catch (error) {
                console.log('Session check failed, proceeding with login');
            }
        });
    </script>
</body>
</html>
